<!DOCTYPE html>
<html>
<head>
    <title>Arkadaşımla Satranç</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
</head>
<body>
    <div id="myBoard" style="width: 400px"></div>
    <p>Oda Kodu: <b id="roomDisp">oda123</b></p>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();
        const boardId = 'myBoard';
        const game = new Chess();
        const roomId = "oda123"; // Şimdilik sabit, sonra dinamik yapabilirsin

        socket.emit('joinRoom', roomId);

        function onDrop(source, target) {
            const move = game.move({ from: source, to: target, promotion: 'q' });
            
            if (move === null) return 'snapback'; // Geçersiz hamle

            // Hamleyi sunucuya gönder
            socket.emit('move', { roomId, move: move.san });
        }

        const config = {
            draggable: true,
            position: 'start',
            onDrop: onDrop
        };
        const board = Chessboard(boardId, config);

        // Karşıdan hamle gelince tahtayı güncelle
        socket.on('move', (move) => {
            game.move(move);
            board.position(game.fen());
        });
    </script>
</body>
</html>
